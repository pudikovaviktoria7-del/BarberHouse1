<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись — BarberHouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">✂ BarberHouse</a>
            <button class="burger-btn">☰</button>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="services.html" class="nav__link">Услуги</a></li>
                    <li><a href="gallery.html" class="nav__link">Галерея</a></li>
                    <li><a href="barbers.html" class="nav__link">Барберы</a></li>
                    <li><a href="reviews.html" class="nav__link">Отзывы</a></li>
                    <li><a href="contacts.html" class="nav__link">Контакты</a></li>
                </ul>
            </nav>
            <a href="booking.html" class="btn btn--primary">Записаться</a>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            <h2 class="page-title">Онлайн <span class="text-underline">запись</span></h2>
            <p class="page-subtitle">Выберите время и мастера</p>
            <div class="form-box">
                <form id="bookingForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ваше имя</label>
                            <input type="text" class="form-input" placeholder="Иван" required>
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="tel" class="form-input" placeholder="+7 (777) 456-67-52" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Выберите услугу</label>
                            <select class="form-input" style="height: 52px;" required>
                                <option value="1">Мужская стрижка — 10 000 ₸</option>
                                <option value="2">Стрижка бороды — 6 500 ₸</option>
                                <option value="3">Комплекс Премиум — 15 000 ₸</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Мастер</label>
                            <select class="form-input" style="height: 52px;" required>
                                <option value="r">Руслан (Топ-барбер)</option>
                                <option value="j">Джек</option>
                                <option value="v">Виталий</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 20px;">Подтвердить запись</button>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Спасибо! Ваша запись успешно отправлена. Наш менеджер свяжется с вами в течение 10 минут.');
            this.reset();
        });
    </script>
</body>
</html>
