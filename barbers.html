<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастера — BarberHouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">✂ BarberHouse</a>
            <button class="burger-btn">☰</button>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="services.html" class="nav__link">Услуги</a></li>
                    <li><a href="gallery.html" class="nav__link">Галерея</a></li>
                    <li><a href="barbers.html" class="nav__link nav__link--active">Барберы</a></li>
                    <li><a href="reviews.html" class="nav__link">Отзывы</a></li>
                    <li><a href="contacts.html" class="nav__link">Контакты</a></li>
                </ul>
            </nav>
            <a href="booking.html" class="btn btn--primary">Записаться</a>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            <h2 class="page-title">Наши <span class="text-underline">барберы</span></h2>
            <p class="page-subtitle">Команда экспертов</p>
            <div class="grid-3">
                <div class="card" style="text-align: center;">
                    <div class="barber-img"><img src="image/barber1.jpg" alt="Руслан"></div>
                    <h3>Руслан</h3>
                    <p class="card__rank">Топ-Барбер</p>
                    <p style="color: var(--text-muted); font-size: 14px;">Стаж работы более 7 лет</p>
                </div>
                <div class="card" style="text-align: center;">
                    <div class="barber-img"><img src="image/barber2.jpg" alt="Джек"></div>
                    <h3>Джек</h3>
                    <p class="card__rank">Барбер</p>
                    <p style="color: var(--text-muted); font-size: 14px;">Мастер классического бритья</p>
                </div>
                <div class="card" style="text-align: center;">
                    <div class="barber-img"><img src="image/barber3.jpg" alt="Виталий"></div>
                    <h3>Виталий</h3>
                    <p class="card__rank">Стилист</p>
                    <p style="color: var(--text-muted); font-size: 14px;">Эксперт в современных фейдах</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
